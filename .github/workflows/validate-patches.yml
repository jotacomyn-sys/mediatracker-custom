name: validate-patches

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  syntax:
    name: Patch syntax + package.json mutation sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: node --check every patch
        run: |
          set -euo pipefail
          fail=0
          for f in patch_*.js _build_megapatches.js; do
            if [ -f "$f" ]; then
              if node --check "$f" 2>/tmp/err; then
                echo "ok  $f"
              else
                echo "BAD $f"
                sed 's/^/    /' /tmp/err
                fail=1
              fi
            fi
          done
          exit "$fail"

      - name: patch_01 produces valid JSON
        run: |
          set -euo pipefail
          # patch_01's package.json mutation runs against /app/package.json.
          # Stage a stub that includes the upstream's direct deps so the
          # patch exercises both the dependencies and overrides branches.
          sudo mkdir -p /app
          sudo tee /app/package.json >/dev/null <<'JSON'
          {
            "name": "mediatracker",
            "version": "0.0.0",
            "dependencies": {
              "axios": "^0.29.0",
              "fast-xml-parser": "^4.5.1",
              "form-data": "^4.0.1",
              "lodash": "^4.17.21",
              "ajv": "^8.17.1",
              "express": "^4.21.2"
            }
          }
          JSON
          sudo node patch_01_security_pre_npm.js
          node -e 'const p=JSON.parse(require("fs").readFileSync("/app/package.json","utf8")); console.log("axios:",p.dependencies.axios); console.log("ajv:",p.dependencies.ajv); console.log("overrides keys:",Object.keys(p.overrides||{}).join(","));'

      - name: every patch knows about the bonukai shape (no hard regressions)
        run: |
          # Cheap reality check: the mega-patches all reference well-known
          # paths inside /app/build/**. If a future refactor drops one of
          # the conventional anchors, this surfaces it without running the
          # whole Dockerfile.
          set -euo pipefail
          grep -l 'process.exit(1)' patch_*.js | while read -r p; do
            anchors=$(grep -cE "anchor not found|SYNTAX ERROR ->|anchor matched" "$p" || true)
            echo "$p: $anchors anchor-failure paths"
          done
